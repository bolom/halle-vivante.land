    <style>
      :root {
        --color-gold: #c5a059;
        --color-emerald: #064e3b;
        --color-cream: #fbfaf5;
      }
      body {
        font-family: 'Inter', sans-serif;
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        background-color: var(--color-cream);
        color: #1a1a1a;
        overflow-x: hidden;
      }
      /* Texture Papier Subtile */
      body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        opacity: 0.04;
        z-index: 9999;
        pointer-events: none;
        background-image: url("https://www.transparenttextures.com/patterns/asfalt-light.png");
      }
      h1, h2, h3, h4, .font-serif {
        font-family: 'Cormorant Garamond', serif;
      }
      .luxury-gradient {
        background: linear-gradient(135deg, #064e3b 0%, #1a2f23 100%);
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-15px) rotate(2deg); }
      }
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }
      .reveal-text {
        clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
      }
      @keyframes reveal {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
      }
      .reveal-item {
        animation: reveal 1.2s cubic-bezier(0.77, 0, 0.175, 1) forwards;
      }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: var(--color-cream); }
      ::-webkit-scrollbar-thumb { background: var(--color-gold); border-radius: 10px; }
    </style>
